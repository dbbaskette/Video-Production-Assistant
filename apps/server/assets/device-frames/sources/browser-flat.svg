<?xml version="1.0" encoding="UTF-8"?>
<!--
  browser-flat — macOS-style browser window chrome with traffic-light
  dots, URL pill, and a tab strip hint. Content area below the chrome
  is transparent so the recording shows through.

  Canvas        2560 × 1600
  Chrome        160px tall (was 120 — extra room for tab strip hint)
  Inset         x=0, y=160, w=2560, h=1440
-->
<svg xmlns="http://www.w3.org/2000/svg" width="2560" height="1600" viewBox="0 0 2560 1600">
  <defs>
    <linearGradient id="chromeBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#f1f1f4"/>
      <stop offset="55%"  stop-color="#e2e2e6"/>
      <stop offset="100%" stop-color="#cfcfd4"/>
    </linearGradient>
    <linearGradient id="urlPill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#fcfcfe"/>
      <stop offset="55%"  stop-color="#f4f4f7"/>
      <stop offset="100%" stop-color="#eaeaee"/>
    </linearGradient>
    <radialGradient id="redDot" cx="35%" cy="30%" r="70%">
      <stop offset="0%"   stop-color="#ff8a7e"/>
      <stop offset="40%"  stop-color="#ff5f57"/>
      <stop offset="100%" stop-color="#cc3a33"/>
    </radialGradient>
    <radialGradient id="yelDot" cx="35%" cy="30%" r="70%">
      <stop offset="0%"   stop-color="#ffd97a"/>
      <stop offset="40%"  stop-color="#febc2e"/>
      <stop offset="100%" stop-color="#cc8a1c"/>
    </radialGradient>
    <radialGradient id="grnDot" cx="35%" cy="30%" r="70%">
      <stop offset="0%"   stop-color="#7eee8a"/>
      <stop offset="40%"  stop-color="#28c840"/>
      <stop offset="100%" stop-color="#1a9028"/>
    </radialGradient>
  </defs>

  <!-- Chrome background with rounded top corners -->
  <path fill="url(#chromeBg)"
        d="M 18 0
           L 2542 0
           Q 2560 0 2560 18
           L 2560 160
           L 0 160
           L 0 18
           Q 0 0 18 0
           Z"/>

  <!-- Inner top edge highlight -->
  <path d="M 18 1 L 2542 1" stroke="#fff" stroke-width="1.5" opacity="0.7"/>

  <!-- Tab strip baseline (subtle) -->
  <rect x="0" y="118" width="2560" height="1" fill="#b8b8be" opacity="0.5"/>

  <!-- Active tab hint (left of URL pill, suggests "one tab open") -->
  <path fill="#fafafd"
        d="M 280 118
           Q 280 60 340 60
           L 800 60
           Q 860 60 860 118
           Z"/>
  <path d="M 280 118 Q 280 60 340 60 L 800 60 Q 860 60 860 118"
        fill="none" stroke="#b8b8be" stroke-width="1.5" opacity="0.7"/>
  <!-- Tab favicon dot + title placeholder -->
  <circle cx="370" cy="90" r="10" fill="#7e7e84" opacity="0.6"/>
  <rect x="400" y="82" width="280" height="14" rx="3" ry="3" fill="#7e7e84" opacity="0.45"/>

  <!-- 1px hairline under the chrome -->
  <line x1="0" y1="160" x2="2560" y2="160" stroke="#a4a4aa" stroke-width="2"/>

  <!-- Traffic-light dots with glossy depth -->
  <circle cx="60"  cy="60" r="22" fill="url(#redDot)"/>
  <circle cx="60"  cy="60" r="22" fill="none" stroke="#8a2a26" stroke-width="0.8" opacity="0.4"/>
  <ellipse cx="55"  cy="52" rx="9" ry="5" fill="#fff" opacity="0.45"/>

  <circle cx="120" cy="60" r="22" fill="url(#yelDot)"/>
  <circle cx="120" cy="60" r="22" fill="none" stroke="#8a6014" stroke-width="0.8" opacity="0.4"/>
  <ellipse cx="115" cy="52" rx="9" ry="5" fill="#fff" opacity="0.45"/>

  <circle cx="180" cy="60" r="22" fill="url(#grnDot)"/>
  <circle cx="180" cy="60" r="22" fill="none" stroke="#1a5a22" stroke-width="0.8" opacity="0.4"/>
  <ellipse cx="175" cy="52" rx="9" ry="5" fill="#fff" opacity="0.45"/>

  <!-- URL pill with inset shadow -->
  <rect x="880" y="28" width="800" height="64" rx="32" ry="32"
        fill="url(#urlPill)" stroke="#bcbcc2" stroke-width="1.5"/>
  <!-- Inset shadow at top of pill (suggests recess) -->
  <path d="M 912 30 Q 880 30 880 60" fill="none" stroke="#000" stroke-width="1.2" opacity="0.08"/>
  <path d="M 880 60 Q 880 30 912 30 L 1648 30 Q 1680 30 1680 60"
        fill="none" stroke="#000" stroke-width="1.2" opacity="0.05"/>

  <!-- Lock glyph -->
  <rect x="908" y="50" width="22" height="20" rx="2" ry="2" fill="#7a7a80"/>
  <rect x="912" y="44" width="14" height="14" rx="6" ry="6"
        fill="none" stroke="#7a7a80" stroke-width="3"/>

  <!-- URL text -->
  <text x="950" y="74" font-family="-apple-system, system-ui, sans-serif"
        font-size="32" fill="#4a4a52">https://example.com/demo</text>

  <!-- Window-edge subtle shadow (1px) -->
  <line x1="0" y1="158" x2="2560" y2="158" stroke="#fff" stroke-width="1" opacity="0.5"/>
</svg>
