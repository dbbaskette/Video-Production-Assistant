<?xml version="1.0" encoding="UTF-8"?>
<!--
  tablet-tilt-right — iPad-style landscape chrome tilted ~10° so the right
  side is closer to the viewer. Camera dot projects onto the tilted top
  bezel.

  Screen quad:
    tl: ( 200, 180)
    tr: (2260,  90)
    br: (2260, 1710)
    bl: ( 200, 1620)
-->
<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1800" viewBox="0 0 2400 1800">
  <defs>
    <linearGradient id="tabletBezelTilt" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0c0c0e"/>
      <stop offset="55%" stop-color="#18181c"/>
      <stop offset="100%" stop-color="#2c2c30"/>
    </linearGradient>
  </defs>

  <!-- Bezel polygon with screen polygon hole -->
  <path fill-rule="evenodd" fill="url(#tabletBezelTilt)"
        d="M 100 80
           L 2360 0
           L 2360 1800
           L 100 1720
           Z
           M 200 180
           L 2260  90
           L 2260 1710
           L 200 1620
           Z"/>

  <!-- Outer rim leading-right highlight -->
  <polyline points="2360,0 2360,1800" stroke="#404048" stroke-width="3" opacity="0.55" fill="none"/>

  <!-- Inner screen-edge ring -->
  <path d="M 200 180 L 2260 90 L 2260 1710 L 200 1620 Z"
        fill="none" stroke="#000000" stroke-width="3" opacity="0.6"/>

  <!-- Camera dot on the tilted top bezel -->
  <circle cx="1230" cy="135" r="7" fill="#0a0a0a"/>
</svg>
