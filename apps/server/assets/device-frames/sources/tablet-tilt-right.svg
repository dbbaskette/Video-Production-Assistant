<?xml version="1.0" encoding="UTF-8"?>
<!--
  tablet-tilt-right — ~22° tilt. Bezel fills the full canvas with the
  screen quad as a hole (masks the perspective filter's video bleed
  outside the quad). See laptop-tilt-right.svg for the full rationale.

  Screen quad:
    tl: ( 360,  300)
    tr: (2280,   80)
    br: (2280, 1720)
    bl: ( 360, 1500)
-->
<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1800" viewBox="0 0 2400 1800">
  <defs>
    <linearGradient id="tabletBezelTilt" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0c0c0e"/>
      <stop offset="55%" stop-color="#18181c"/>
      <stop offset="100%" stop-color="#2c2c30"/>
    </linearGradient>
  </defs>

  <!-- Full-canvas bezel with screen quad as the only hole -->
  <path fill-rule="evenodd" fill="url(#tabletBezelTilt)"
        d="M 0 0
           L 2400 0
           L 2400 1800
           L 0 1800
           Z
           M 360 300
           L 2280  80
           L 2280 1720
           L 360 1500
           Z"/>

  <!-- Inner stroke around the screen quad -->
  <path d="M 360 300 L 2280 80 L 2280 1720 L 360 1500 Z"
        fill="none" stroke="#000000" stroke-width="3" opacity="0.6"/>

  <!-- Faint device-shape outline so the tablet reads against the
       full-canvas bezel -->
  <path d="M 300 240 L 2340 20" stroke="#3a3a3e" stroke-width="2" opacity="0.35" fill="none"/>
  <path d="M 300 1560 L 2340 1780" stroke="#3a3a3e" stroke-width="2" opacity="0.35" fill="none"/>

  <!-- Camera dot at midpoint of tilted top -->
  <circle cx="1320" cy="180" r="7" fill="#0a0a0a"/>
</svg>
