<?xml version="1.0" encoding="UTF-8"?>
<!--
  tablet-tilt-right — stronger ~22° tilt. Left edge ~27% shorter than right.

  Screen quad:
    tl: ( 360,  300)
    tr: (2280,   80)
    br: (2280, 1720)
    bl: ( 360, 1500)
-->
<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1800" viewBox="0 0 2400 1800">
  <defs>
    <linearGradient id="tabletBezelTilt" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0c0c0e"/>
      <stop offset="55%" stop-color="#18181c"/>
      <stop offset="100%" stop-color="#2c2c30"/>
    </linearGradient>
  </defs>

  <!-- Bezel polygon with screen polygon hole -->
  <path fill-rule="evenodd" fill="url(#tabletBezelTilt)"
        d="M 300 240
           L 2340  20
           L 2340 1780
           L 300 1560
           Z
           M 360 300
           L 2280  80
           L 2280 1720
           L 360 1500
           Z"/>

  <!-- Outer rim leading-right highlight -->
  <polyline points="2340,20 2340,1780" stroke="#404048" stroke-width="3" opacity="0.55" fill="none"/>

  <!-- Inner screen-edge ring -->
  <path d="M 360 300 L 2280 80 L 2280 1720 L 360 1500 Z"
        fill="none" stroke="#000000" stroke-width="3" opacity="0.6"/>

  <!-- Camera dot on tilted top bezel midpoint -->
  <circle cx="1320" cy="180" r="7" fill="#0a0a0a"/>
</svg>
