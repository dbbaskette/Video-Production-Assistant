<?xml version="1.0" encoding="UTF-8"?>
<!--
  laptop-tilt-right — stronger ~22° tilt so the perspective reads even at
  thumbnail size. Left edge is ~25% shorter than the right.

  Screen quad (manifest "quad"):
    tl: ( 400,  260)
    tr: (2440,   80)
    br: (2440, 1520)
    bl: ( 400, 1340)
-->
<svg xmlns="http://www.w3.org/2000/svg" width="2560" height="1600" viewBox="0 0 2560 1600">
  <defs>
    <linearGradient id="bezelGradientTilt" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0c0c0d"/>
      <stop offset="55%" stop-color="#19191b"/>
      <stop offset="100%" stop-color="#2a2a2c"/>
    </linearGradient>
  </defs>

  <!-- Bezel quad with screen quad punched out (even-odd fill).
       Bezel ~60px outside each screen-quad corner along the diagonal. -->
  <path fill-rule="evenodd" fill="url(#bezelGradientTilt)"
        d="M 340 200
           L 2500  20
           L 2500 1580
           L 340 1400
           Z
           M 400 260
           L 2440  80
           L 2440 1520
           L 400 1340
           Z"/>

  <!-- Outer rim highlight on the leading-right edge -->
  <polyline points="2500,20 2500,1580" stroke="#404044" stroke-width="3" opacity="0.55" fill="none"/>

  <!-- Inner screen-edge shadow -->
  <path d="M 400 260 L 2440 80 L 2440 1520 L 400 1340 Z"
        fill="none" stroke="#000000" stroke-width="3" opacity="0.6"/>

  <!-- Camera notch — projected onto the tilted top edge at midpoint -->
  <circle cx="1420" cy="170" r="6" fill="#0a0a0a"/>
</svg>
