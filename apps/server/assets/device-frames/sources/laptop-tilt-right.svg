<?xml version="1.0" encoding="UTF-8"?>
<!--
  laptop-tilt-right — ~22° tilt. Bezel fills the full canvas with the
  screen quad as a hole; this is required because the render pipeline's
  perspective filter scales the video to the full canvas before warping,
  and pixels outside the screen quad become garbage extrapolation. The
  full-canvas bezel masks that bleed. (Side effect: any frame_background
  color is hidden behind the bezel on perspective variants — the visible
  device sits flush with the canvas edges.)

  Screen quad (manifest "quad"):
    tl: ( 400,  260)
    tr: (2440,   80)
    br: (2440, 1520)
    bl: ( 400, 1340)
-->
<svg xmlns="http://www.w3.org/2000/svg" width="2560" height="1600" viewBox="0 0 2560 1600">
  <defs>
    <linearGradient id="bezelGradientTilt" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0c0c0d"/>
      <stop offset="55%" stop-color="#19191b"/>
      <stop offset="100%" stop-color="#2a2a2c"/>
    </linearGradient>
  </defs>

  <!-- Full-canvas bezel with screen quad punched out (even-odd fill). -->
  <path fill-rule="evenodd" fill="url(#bezelGradientTilt)"
        d="M 0 0
           L 2560 0
           L 2560 1600
           L 0 1600
           Z
           M 400 260
           L 2440  80
           L 2440 1520
           L 400 1340
           Z"/>

  <!-- Subtle inner stroke around the screen quad to give the bezel rim
       depth where it meets the screen. -->
  <path d="M 400 260 L 2440 80 L 2440 1520 L 400 1340 Z"
        fill="none" stroke="#000000" stroke-width="3" opacity="0.6"/>

  <!-- A faint device-shape outline so the eye still reads "laptop" even
       though the bezel runs to the canvas edges. Two slanted strokes
       parallel to the screen quad's left + right edges. -->
  <path d="M 340 200 L 2500 20" stroke="#3a3a3c" stroke-width="2" opacity="0.35" fill="none"/>
  <path d="M 340 1400 L 2500 1580" stroke="#3a3a3c" stroke-width="2" opacity="0.35" fill="none"/>

  <!-- Camera notch — projected onto the tilted top edge -->
  <circle cx="1420" cy="170" r="6" fill="#0a0a0a"/>
</svg>
