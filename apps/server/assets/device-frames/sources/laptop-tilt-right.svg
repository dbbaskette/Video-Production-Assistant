<?xml version="1.0" encoding="UTF-8"?>
<!--
  laptop-tilt-right — laptop chrome tilted ~12° so the right side is closer
  to the viewer. Screen region is a trapezoidal quad; manifest declares it
  via the four corners (tl, tr, br, bl). The bezel polygon wraps around
  the screen quad ~80px outset on each side.

  Screen quad (manifest "quad"):
    tl: ( 200,  180)
    tr: (2400,  100)
    br: (2400, 1500)
    bl: ( 200, 1420)
-->
<svg xmlns="http://www.w3.org/2000/svg" width="2560" height="1600" viewBox="0 0 2560 1600">
  <defs>
    <linearGradient id="bezelGradientTilt" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0c0c0d"/>
      <stop offset="55%" stop-color="#19191b"/>
      <stop offset="100%" stop-color="#2a2a2c"/>
    </linearGradient>
  </defs>

  <!-- Bezel quad with screen quad punched out (even-odd fill).
       Outer (bezel) corners offset ~80px outside the screen quad. -->
  <path fill-rule="evenodd" fill="url(#bezelGradientTilt)"
        d="M 120 100
           L 2480  20
           L 2480 1580
           L 120 1500
           Z
           M 200 180
           L 2400  100
           L 2400 1500
           L 200 1420
           Z"/>

  <!-- Outer rim highlight (subtle, on the leading-right edge) -->
  <polyline points="2480,20 2480,1580" stroke="#404044" stroke-width="3" opacity="0.55" fill="none"/>

  <!-- Inner screen-edge shadow ring (one dark stroke around the quad) -->
  <path d="M 200 180 L 2400 100 L 2400 1500 L 200 1420 Z"
        fill="none" stroke="#000000" stroke-width="3" opacity="0.6"/>

  <!-- Camera notch — projected onto the top edge of the screen quad -->
  <circle cx="1300" cy="138" r="6" fill="#0a0a0a"/>
</svg>
