<?xml version="1.0" encoding="UTF-8"?>
<!--
  android-tilt-right — Android chrome tilted ~10° so the right side is
  closer to the viewer. Hole-punch camera is projected onto the tilted
  top edge of the screen quad.

  Screen quad:
    tl: ( 90, 190)
    tr: (1110, 110)
    br: (1110, 2490)
    bl: ( 90, 2410)
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="2600" viewBox="0 0 1200 2600">
  <defs>
    <linearGradient id="androidBezelTilt" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0a0a0c"/>
      <stop offset="55%" stop-color="#141417"/>
      <stop offset="100%" stop-color="#26262a"/>
    </linearGradient>
  </defs>

  <!-- Bezel polygon with screen polygon hole -->
  <path fill-rule="evenodd" fill="url(#androidBezelTilt)"
        d="M 40 130
           L 1160 50
           L 1160 2550
           L 40 2470
           Z
           M 90 190
           L 1110 110
           L 1110 2490
           L 90 2410
           Z"/>

  <!-- Outer rim leading-right highlight -->
  <polyline points="1160,50 1160,2550" stroke="#404048" stroke-width="3" opacity="0.55" fill="none"/>

  <!-- Inner screen-edge ring -->
  <path d="M 90 190 L 1110 110 L 1110 2490 L 90 2410 Z"
        fill="none" stroke="#000000" stroke-width="3" opacity="0.6"/>

  <!-- Hole-punch camera, projected onto tilted top -->
  <circle cx="600" cy="265" r="32" fill="#000000"/>
  <circle cx="600" cy="265" r="20" fill="#0a0a0c"/>
  <circle cx="600" cy="265" r="11" fill="#1a1a2a" opacity="0.6"/>
</svg>
