<?xml version="1.0" encoding="UTF-8"?>
<!--
  android-tilt-right — stronger ~22° tilt. Left edge ~27% shorter than
  the right.

  Screen quad:
    tl: ( 180,  400)
    tr: (1140,   80)
    br: (1140, 2520)
    bl: ( 180, 2200)
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="2600" viewBox="0 0 1200 2600">
  <defs>
    <linearGradient id="androidBezelTilt" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0a0a0c"/>
      <stop offset="55%" stop-color="#141417"/>
      <stop offset="100%" stop-color="#26262a"/>
    </linearGradient>
  </defs>

  <!-- Bezel polygon with screen polygon hole -->
  <path fill-rule="evenodd" fill="url(#androidBezelTilt)"
        d="M 120 340
           L 1180  40
           L 1180 2560
           L 120 2260
           Z
           M 180 400
           L 1140  80
           L 1140 2520
           L 180 2200
           Z"/>

  <!-- Outer rim leading-right highlight -->
  <polyline points="1180,40 1180,2560" stroke="#404048" stroke-width="3" opacity="0.55" fill="none"/>

  <!-- Inner screen-edge ring -->
  <path d="M 180 400 L 1140 80 L 1140 2520 L 180 2200 Z"
        fill="none" stroke="#000000" stroke-width="3" opacity="0.6"/>

  <!-- Hole-punch camera, projected onto tilted top of screen quad -->
  <circle cx="660" cy="240" r="32" fill="#000000"/>
  <circle cx="660" cy="240" r="20" fill="#0a0a0c"/>
  <circle cx="660" cy="240" r="11" fill="#1a1a2a" opacity="0.6"/>
</svg>
