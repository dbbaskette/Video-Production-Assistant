<?xml version="1.0" encoding="UTF-8"?>
<!--
  tablet-flat — iPad-style landscape chrome. 4:3 aspect, even bezel on
  all four sides, camera at top center of the bezel.

  Canvas        2400 × 1800   (4:3)
  Outer corners 60px radius
  Inset         x=100, y=100, w=2200, h=1600, inner-corner radius 18px
-->
<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1800" viewBox="0 0 2400 1800">
  <defs>
    <linearGradient id="tabletBezel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2c2c30"/>
      <stop offset="55%" stop-color="#18181c"/>
      <stop offset="100%" stop-color="#0c0c0e"/>
    </linearGradient>
  </defs>

  <!-- Bezel + screen cutout -->
  <path fill-rule="evenodd" fill="url(#tabletBezel)"
        d="M 60 0
           L 2340 0
           Q 2400 0 2400 60
           L 2400 1740
           Q 2400 1800 2340 1800
           L 60 1800
           Q 0 1800 0 1740
           L 0 60
           Q 0 0 60 0
           Z
           M 118 100
           Q 100 100 100 118
           L 100 1682
           Q 100 1700 118 1700
           L 2282 1700
           Q 2300 1700 2300 1682
           L 2300 118
           Q 2300 100 2282 100
           Z"/>

  <!-- Outer rim highlight -->
  <rect x="2" y="2" width="2396" height="1796" rx="58" ry="58"
        fill="none" stroke="#3c3c40" stroke-width="2" opacity="0.4"/>

  <!-- Inner screen-edge shadow -->
  <rect x="100" y="100" width="2200" height="1600" rx="18" ry="18"
        fill="none" stroke="#000000" stroke-width="2" opacity="0.7"/>

  <!-- Camera dot at top center bezel -->
  <circle cx="1200" cy="50" r="8" fill="#0a0a0a"/>
  <circle cx="1200" cy="50" r="3" fill="#404044" opacity="0.6"/>
</svg>
