<?xml version="1.0" encoding="UTF-8"?>
<!--
  browser-tilt-right — browser window tilted ~10° so the right side
  is closer to the viewer. Title bar and content area are both warped
  into a trapezoid. The traffic-light dots and URL pill are projected
  onto the tilted title bar.

  Content quad (where the recording lands):
    tl: ( 120, 220)
    tr: (2440, 130)
    br: (2440, 1590)
    bl: ( 120, 1500)

  Title quad (above the content, visually attached):
    tl: ( 120,  100)
    tr: (2440,  10)
    br: (2440, 130)
    bl: ( 120, 220)
-->
<svg xmlns="http://www.w3.org/2000/svg" width="2560" height="1600" viewBox="0 0 2560 1600">
  <defs>
    <linearGradient id="browserChromeTilt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8e8ed"/>
      <stop offset="100%" stop-color="#d0d0d6"/>
    </linearGradient>
  </defs>

  <!-- Outer window frame quad — encloses both title and content.
       Punched-out content quad is the inset. -->
  <path fill-rule="evenodd" fill="#bcbcc2"
        d="M  90  90
           L 2470  0
           L 2470 1600
           L  90 1510
           Z
           M 120 220
           L 2440 130
           L 2440 1590
           L 120 1500
           Z"/>

  <!-- Title-bar polygon (above content quad) -->
  <polygon points="120,100 2440,10 2440,130 120,220" fill="url(#browserChromeTilt)"/>

  <!-- Hairline under title bar -->
  <polyline points="120,220 2440,130" stroke="#a8a8ae" stroke-width="2" fill="none"/>

  <!-- Traffic-light dots — projected onto the tilted title bar near top-left.
       Y values fall along the line from tl(120,100) to tr(2440,10):
       slope = (10-100) / (2440-120) = -0.0388. For x=180: y = 100 + (60)*(-0.0388) ≈ 97.6.
       Small adjustments visually below. -->
  <circle cx="180" cy="160" r="20" fill="#ff5f57"/>
  <circle cx="240" cy="158" r="20" fill="#febc2e"/>
  <circle cx="300" cy="156" r="20" fill="#28c840"/>

  <!-- URL pill projected onto title bar, roughly centered horizontally.
       Drawn as a polygon to follow the tilt. -->
  <polygon points="980,148 1780,118 1780,178 980,208" fill="#fbfbfd" stroke="#c4c4ca" stroke-width="1"/>
  <text x="1010" y="184" font-family="-apple-system, system-ui, sans-serif" font-size="28" fill="#5a5a60">https://example.com/demo</text>

  <!-- Inner content-edge ring (around the inset quad) -->
  <path d="M 120 220 L 2440 130 L 2440 1590 L 120 1500 Z"
        fill="none" stroke="#000000" stroke-width="2" opacity="0.4"/>
</svg>
