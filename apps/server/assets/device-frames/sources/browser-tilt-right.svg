<?xml version="1.0" encoding="UTF-8"?>
<!--
  browser-tilt-right — stronger ~22° tilt. Title bar and content area
  both tilt together. Left edge ~25% shorter.

  Content quad (manifest "quad"):
    tl: ( 220,  340)
    tr: (2440,  130)
    br: (2440, 1590)
    bl: ( 220, 1380)

  Title bar quad (above content, attached):
    tl: ( 220,  220)
    tr: (2440,   10)
    br: (2440,  130)
    bl: ( 220,  340)
-->
<svg xmlns="http://www.w3.org/2000/svg" width="2560" height="1600" viewBox="0 0 2560 1600">
  <defs>
    <linearGradient id="browserChromeTilt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8e8ed"/>
      <stop offset="100%" stop-color="#d0d0d6"/>
    </linearGradient>
  </defs>

  <!-- Outer window frame (encloses both title + content) with content
       quad punched out. Title-bar area is solid; content area is the
       inset where the recording lands. -->
  <path fill-rule="evenodd" fill="#bcbcc2"
        d="M 180 200
           L 2480   0
           L 2480 1600
           L 180 1400
           Z
           M 220 340
           L 2440 130
           L 2440 1590
           L 220 1380
           Z"/>

  <!-- Title-bar polygon (above content quad, drawn separately to give
       it a different gradient + hairline) -->
  <polygon points="220,220 2440,10 2440,130 220,340" fill="url(#browserChromeTilt)"/>

  <!-- Hairline under title bar (along bottom edge of title quad) -->
  <polyline points="220,340 2440,130" stroke="#a8a8ae" stroke-width="2" fill="none"/>

  <!-- Traffic-light dots projected onto top-left of tilted title bar.
       Top edge slope = (10-220) / (2440-220) ≈ -0.0946. So at x=300,
       y ≈ 220 + (80)*(-0.0946) ≈ 212. -->
  <circle cx="300" cy="282" r="22" fill="#ff5f57"/>
  <circle cx="368" cy="276" r="22" fill="#febc2e"/>
  <circle cx="436" cy="270" r="22" fill="#28c840"/>

  <!-- URL pill projected onto the tilted title bar near the center -->
  <polygon points="1020,256 1820,180 1820,250 1020,326" fill="#fbfbfd" stroke="#c4c4ca" stroke-width="1"/>
  <text x="1054" y="296" font-family="-apple-system, system-ui, sans-serif" font-size="28" fill="#5a5a60">https://example.com/demo</text>

  <!-- Inner content-edge ring -->
  <path d="M 220 340 L 2440 130 L 2440 1590 L 220 1380 Z"
        fill="none" stroke="#000000" stroke-width="2" opacity="0.4"/>
</svg>
