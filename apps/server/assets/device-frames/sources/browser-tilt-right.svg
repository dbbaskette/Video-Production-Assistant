<?xml version="1.0" encoding="UTF-8"?>
<!--
  browser-tilt-right — ~22° tilt. Title bar + content area both tilt
  together. Frame fills the full canvas with the content quad as a hole
  (masks the perspective filter's video bleed outside the quad). See
  laptop-tilt-right.svg for the full rationale.

  Content quad (manifest "quad"):
    tl: ( 220,  340)
    tr: (2440,  130)
    br: (2440, 1590)
    bl: ( 220, 1380)
-->
<svg xmlns="http://www.w3.org/2000/svg" width="2560" height="1600" viewBox="0 0 2560 1600">
  <defs>
    <linearGradient id="browserChromeTilt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8e8ed"/>
      <stop offset="100%" stop-color="#d0d0d6"/>
    </linearGradient>
  </defs>

  <!-- Full-canvas window frame with content quad punched out.
       Filled in the window-frame neutral grey. -->
  <path fill-rule="evenodd" fill="#bcbcc2"
        d="M 0 0
           L 2560 0
           L 2560 1600
           L 0 1600
           Z
           M 220 340
           L 2440 130
           L 2440 1590
           L 220 1380
           Z"/>

  <!-- Title-bar polygon (above content quad) painted with lighter
       gradient so it reads as the chrome title strip. -->
  <polygon points="220,220 2440,10 2440,130 220,340" fill="url(#browserChromeTilt)"/>

  <!-- Hairline under title bar -->
  <polyline points="220,340 2440,130" stroke="#a8a8ae" stroke-width="2" fill="none"/>

  <!-- Title-bar geometry helpers:
       Top edge slope = (10-220)/(2440-220) = -0.0946 → tilt ≈ -5.41° (rotate
       the text by this amount so it follows the chrome). Title-bar
       vertical center at x=X is roughly 280 + (X-220) * -0.0946. -->

  <!-- Traffic-light dots — centered along the tilted title-bar midline -->
  <circle cx="300"  cy="272" r="22" fill="#ff5f57"/>
  <circle cx="368"  cy="266" r="22" fill="#febc2e"/>
  <circle cx="436"  cy="260" r="22" fill="#28c840"/>

  <!-- URL pill — centered inside the title bar (60px tall, sloped to match
       the title bar's top/bottom edges). At x=1020 the title bar spans
       y=144..264; pill is y=174..234. At x=1820 it spans y=69..189; pill
       is y=99..159. -->
  <polygon points="1020,174 1820,99 1820,159 1020,234" fill="#fbfbfd" stroke="#c4c4ca" stroke-width="1"/>

  <!-- Lock glyph inside the pill, projected onto the slope -->
  <g transform="rotate(-5.41 1058 211)">
    <rect x="1058" y="200" width="20" height="18" rx="2" ry="2" fill="#8a8a90"/>
    <rect x="1062" y="194" width="12" height="12" rx="6" ry="6" fill="none" stroke="#8a8a90" stroke-width="3"/>
  </g>

  <!-- URL text — rotated -5.41° around its anchor so it follows the
       title-bar slope cleanly. -->
  <text x="1098" y="218"
        transform="rotate(-5.41 1098 218)"
        font-family="-apple-system, system-ui, sans-serif"
        font-size="28" fill="#5a5a60">https://example.com/demo</text>

  <!-- Inner content-edge ring -->
  <path d="M 220 340 L 2440 130 L 2440 1590 L 220 1380 Z"
        fill="none" stroke="#000000" stroke-width="2" opacity="0.4"/>
</svg>
