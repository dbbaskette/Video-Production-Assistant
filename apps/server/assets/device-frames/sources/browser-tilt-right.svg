<?xml version="1.0" encoding="UTF-8"?>
<!--
  browser-tilt-right — ~22° tilt. Title bar + content area both tilt
  together. Frame fills the full canvas with the content quad as a hole
  (masks the perspective filter's video bleed outside the quad). See
  laptop-tilt-right.svg for the full rationale.

  Content quad (manifest "quad"):
    tl: ( 220,  340)
    tr: (2440,  130)
    br: (2440, 1590)
    bl: ( 220, 1380)
-->
<svg xmlns="http://www.w3.org/2000/svg" width="2560" height="1600" viewBox="0 0 2560 1600">
  <defs>
    <linearGradient id="browserChromeTilt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8e8ed"/>
      <stop offset="100%" stop-color="#d0d0d6"/>
    </linearGradient>
  </defs>

  <!-- Full-canvas window frame with content quad punched out.
       Filled in the window-frame neutral grey. -->
  <path fill-rule="evenodd" fill="#bcbcc2"
        d="M 0 0
           L 2560 0
           L 2560 1600
           L 0 1600
           Z
           M 220 340
           L 2440 130
           L 2440 1590
           L 220 1380
           Z"/>

  <!-- Title-bar polygon (above content quad) painted with lighter
       gradient so it reads as the chrome title strip. -->
  <polygon points="220,220 2440,10 2440,130 220,340" fill="url(#browserChromeTilt)"/>

  <!-- Hairline under title bar -->
  <polyline points="220,340 2440,130" stroke="#a8a8ae" stroke-width="2" fill="none"/>

  <!-- Traffic-light dots projected onto the tilted title bar near top-left -->
  <circle cx="300" cy="282" r="22" fill="#ff5f57"/>
  <circle cx="368" cy="276" r="22" fill="#febc2e"/>
  <circle cx="436" cy="270" r="22" fill="#28c840"/>

  <!-- URL pill projected onto tilted title bar -->
  <polygon points="1020,256 1820,180 1820,250 1020,326" fill="#fbfbfd" stroke="#c4c4ca" stroke-width="1"/>
  <text x="1054" y="296" font-family="-apple-system, system-ui, sans-serif" font-size="28" fill="#5a5a60">https://example.com/demo</text>

  <!-- Inner content-edge ring -->
  <path d="M 220 340 L 2440 130 L 2440 1590 L 220 1380 Z"
        fill="none" stroke="#000000" stroke-width="2" opacity="0.4"/>
</svg>
